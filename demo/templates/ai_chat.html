{% extends "base.html" %} {% block mainbody %}
<div class="ai-chat-page-container">
    <!-- 页面标题 -->
    <div class="ai-chat-title-section">
        <div class="ai-chat-icon-box-modern">
            <i class="fa fa-comments"></i>
        </div>
        <div class="ai-chat-title-text-content">
            <h2 class="ai-chat-main-title">智能农业问答助手</h2>
            <p class="ai-chat-subtitle">基于人工智能的农业知识问答系统</p>
        </div>
    </div>

    <!-- 面包屑导航 -->
    <ol class="ai-chat-breadcrumb-modern">
        <li><a href="/"><i class="fa fa-home"></i> 首页</a></li>
        <li class="ai-chat-breadcrumb-divider">/</li>
        <li class="active"><i class="fa fa-robot"></i> AI 智能问答</li>
    </ol>

    <!-- 聊天主卡片 -->
    <div class="ai-chat-card-modern">
        <div class="ai-chat-card-header-modern">
            <div class="ai-chat-header-icon">
                <i class="fa fa-commenting"></i>
            </div>
            <span class="ai-chat-header-title">在线提问</span>
        </div>
        <div class="ai-chat-card-body-modern">
            <!-- 输入区域 -->
            <div class="ai-chat-input-wrapper-modern">
                <label class="ai-chat-input-label">
                    <i class="fa fa-edit"></i>
                    <span>请输入您的问题：</span>
                </label>
                <textarea
                        id="chatInput"
                        class="ai-chat-textarea-modern"
                        placeholder="例如：小麦生病了怎么办？崇明县适合种植什么作物？"
                        rows="5"
                ></textarea>
            </div>

            <!-- 发送按钮 -->
            <div class="ai-chat-button-wrapper">
                <button id="sendBtn" class="ai-chat-send-btn-modern" onclick="sendChat()">
                    <i class="fa fa-paper-plane"></i>
                    <span>发送提问</span>
                </button>
            </div>

            <!-- 回复区域 -->
            <div class="ai-chat-reply-wrapper-modern">
                <div class="ai-chat-reply-header">
                    <div class="ai-chat-robot-icon">
                        <i class="fa fa-robot"></i>
                    </div>
                    <span class="ai-chat-reply-title">AI 回复：</span>
                </div>
                <div id="chatResult" class="ai-chat-reply-content-modern">
                    <span class="ai-chat-placeholder-text">请在上方输入您的问题，点击发送后我将为您解答...</span>
                </div>
            </div>
        </div>
    </div>
</div>
    <script>
        async function sendChat() {
            const inputElement = document.getElementById('chatInput');
            const resultElement = document.getElementById('chatResult');
            const btnElement = document.getElementById('sendBtn');
            const msg = inputElement.value.trim();

            if (!msg) {
                alert("请输入问题！");
                return;
            }

            // 更新 UI 状态
            resultElement.innerText = "正在思考中，请稍候...";
            btnElement.disabled = true;

            try {
                const res = await fetch('/api/llm_chat/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    resultElement.innerText = data.data.reply;

                    if (data.data.entity) {
                        const entityName = data.data.entity;
                        const kgUrl = `/search_entity?user_text=${encodeURIComponent(entityName)}`;

                        resultElement.innerHTML += `
                            <hr style="margin-top: 20px;">
                            <h4 style="color: #333;">📊 【${entityName}】相关知识图谱：</h4>
                            <div style="border: 1px solid #ddd; border-radius: 8px; overflow: hidden;">
                                <iframe src="${kgUrl}" width="100%" height="600px" frameborder="0" scrolling="no"></iframe>
                            </div>
                        `;
                    }
                } else {
                    resultElement.innerText = "请求错误: " + data.msg;
                }
            } catch (error) {
                resultElement.innerText = "网络异常: " + error;
            } finally {
                btnElement.disabled = false;
            }
        }
    </script>
{% endblock %}
