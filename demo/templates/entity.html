{% extends "base.html" %} {% block mainbody %}

<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <title></title>
    <meta charset="utf-8" />
    <script src="/static/js/echarts.js"></script>
{#    <script type="text/javascript" src="http://echarts.baidu.com/gallery/vendors/echarts/echarts-all-3.js"></script>#}
</head>
<title>实体</title>
<div class="entity-page-container">
    <!-- 页面标题 -->
    <div class="entity-title-section">
        <div class="entity-icon-box-modern">
            <i class="fa fa-share-alt"></i>
        </div>
        <div class="entity-title-text-content">
            <h2 class="entity-main-title">模糊搜索</h2>
            <p class="entity-subtitle">知识图谱实体关系可视化查询</p>
        </div>
    </div>

    <!-- 面包屑 -->
    <ol class="entity-breadcrumb-modern">
        <li><a href="/"><i class="fa fa-home"></i> 首页</a></li>
        <li class="entity-breadcrumb-divider">/</li>
        <li class="active">实体查询</li>
    </ol>

    <!-- 搜索表单 -->
    <div class="card entity-search-card-modern">
        <div class="entity-card-header-modern entity-header-primary">
            <div class="entity-header-icon">
                <i class="fa fa-search"></i>
            </div>
            <span class="entity-header-title">查询条件</span>
        </div>
        <div class="entity-card-body-modern">
            <form method="get" id="searchEntityForm">
                <div class="entity-search-input-group">
                    <input
                            type="text"
                            id="user_text"
                            name="user_text"
                            class="entity-form-control-modern"
                            placeholder="输入实体名称"
                            aria-describedby="basic-addon1"
                    >
                    <button
                            type="button"
                            class="entity-btn-search-modern"
                            onclick="document.getElementById('searchEntityForm').submit();"
                    >
                        <i class="fa fa-search"></i>
                        <span>查询</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 提示信息 -->
    {% if ctx %}
    <div class="entity-alert-section">
        <div class="card entity-warning-card-modern">
            <div class="entity-card-body-warning-modern">
                <div class="entity-warning-icon">
                    <i class="fa fa-exclamation-triangle"></i>
                </div>
                <div class="entity-warning-content">
                    <h3>数据库中暂未添加该实体</h3>
                </div>
            </div>
        </div>
    </div>
    {% endif %}

    <!-- 关系图 -->
    {% if entityRelation %}
    <div class="entity-graph-section">
        <div class="card entity-graph-card-modern">
            <div class="entity-card-header-modern entity-header-success">
                <div class="entity-header-icon">
                    <i class="fa fa-project-diagram"></i>
                </div>
                <span class="entity-header-title">关系图</span>
            </div>
            <div class="entity-card-body-graph-modern">
                <div id="graph" style="width: 100%; height:600px;"></div>
            </div>
        </div>
    </div>

    <!-- 关系列表 -->
    <div class="entity-table-section">
        <div class="card entity-table-card-modern">
            <div class="entity-card-header-modern entity-header-info">
                <div class="entity-header-icon">
                    <i class="fa fa-list"></i>
                </div>
                <span class="entity-header-title">关系列表</span>
            </div>
            <div class="entity-card-body-table-modern">
                <table class="entity-table-modern" data-paging="true" data-sorting="true"></table>
            </div>
        </div>
    </div>
    {% endif %}
</div>
{% if entityRelation %}
<script src="/static/js/jquery.min.js"></script>
<script type="text/javascript">
        // 将后端的查询结果使用echarts展示
        var ctx = [ {{ ctx|safe }} ] ;

        //{entity2,rel}
        var entityRelation = [ {{ entityRelation|safe }} ] ;

        var data = [] ;
        var links = [] ;
        if(ctx.length == 0){
            var node = {} ;
            var url = decodeURI(location.search) ;
            var str = "";
            if(url.indexOf("?") != -1){
                str = url.split("=")[1]
            }
            //实体１
            node['name'] = str;
            //alert(document.getElementById('user_text').value)
            node['draggable'] = true ;
            var id = 0; 
            node['id'] = id.toString() ;
            data.push(node) ;

            //获取实体２，存储在data中，如果实体2已经存在于data中，则不push
            var maxDisPlayNode = 15 ;
            for( var i = 0 ;i < Math.min(maxDisPlayNode,entityRelation[0].length) ; i++ ){
                node = {} ;
                node['name'] = entityRelation[0][i]['entity2']['title'] ;
                node['draggable'] = true ;
                if('url' in entityRelation[0][i]['entity2']){
                    node['category'] = 1 ;
                }
                else{
                    node['category'] = 2 ;
                }
                id = i + 1
                node['id'] = id.toString();
                var flag = 1 ;
                relationTarget = id.toString() ;
                for(var j = 0 ; j<data.length ;j++){
                    if(data[j]['name'] === node['name']){
                        flag = 0 ;
                        relationTarget = data[j]['id']  ;
                        break ;
                    }
                }
                relation = {}
                relation['source'] = 0 ;
                relation['target'] = relationTarget ;
                relation['category'] = 0 ;               

                if(flag === 1){
                    data.push(node) ;
                    relation['value'] = entityRelation[0][i]['rel']['type'] ;
                    relation['symbolSize'] = 10
                    links.push(relation) ;
                }
                else{
                    maxDisPlayNode += 1 ;
                    for(var j = 0; j<links.length ;j++){
                        if(links[j]['target'] === relationTarget){
                            links[j]['value'] = links[j]['value']+" | "+entityRelation[0][i]['rel']['type'] 
                            break ;
                        }
                    }

                }

            }

            //用表格列出所有的关系
            tableData = []
            for (var i = 0 ; i < entityRelation[0].length ; i++){
                relationData = {} ;
                relationData['entity1'] = str ;
                relationData['relation'] = entityRelation[0][i]['rel']['type'] ;
                relationData['entity2'] = entityRelation[0][i]['entity2']['title'] ;
                tableData.push(relationData) ;
            }
            jQuery(function(){
                $('.entity-table-modern').footable({
                "columns": [{"name":"entity1",title:"Entity1"} ,
                          {"name":"relation",title:"Relation"},
                          {"name":"entity2",title:"Entity2"}],
                "rows": tableData
                });
            });

        }
        // 基于准备好的dom，初始化echarts实例
        var myChart = echarts.init(document.getElementById('graph'));
        
        option = {
            title: {
                text: ''
            },
            tooltip: {},
            animationDurationUpdate: 1500,
            animationEasingUpdate: 'quinticInOut',
            label: {
                normal: {
                    show: true,
                    textStyle: {
                        fontSize: 12
                    },
                }
            },
            legend: {
                x: "center",
                show: false
            },
            series: [

                {
                    type: 'graph',
                    layout: 'force',
                    symbolSize: 45,
                    focusNodeAdjacency: true,
                    roam: true,
                    edgeSymbol: ['none', 'arrow'],
                    categories: [{
                        name: '查询实体',
                        itemStyle: {
                            normal: {
                                color: "#009800",
                            }
                        }
                    }, {
                        name: 'HudongItem',
                        itemStyle: {
                            normal: {
                                color: "#4592FF",
                            }
                        }
                    }, {
                        name: 'NewNode',
                        itemStyle: {
                            normal: {
                                color: "#C71585",
                            }
                        }
                    }],
                    label: {
                        normal: {
                            show: true,
                            textStyle: {
                                fontSize: 12,
                            },
                        }
                    },
                    force: {
                        repulsion: 1000
                    },
                    edgeSymbolSize: [4, 50],
                    edgeLabel: {
                        normal: {
                            show: true,
                            textStyle: {
                                fontSize: 10
                            },
                            formatter: "{c}"
                        }
                    },
                    data: data,
                    links: links,
                    lineStyle: {
                        normal: {
                            opacity: 0.9,
                            width: 1.3,
                            curveness: 0,
                            color:"#262626"
                        }
                    }
                }
            ]
        };

// 使用刚指定的配置项和数据显示图表。
        myChart.setOption(option);
</script>
{% endif %}

{% endblock %}
