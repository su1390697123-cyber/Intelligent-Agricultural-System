{% extends "base.html" %} {% block mainbody %}

<div class="index-page-container">
    <!-- 页面标题 -->
    <div class="index-title-section">
        <div class="index-icon-box-modern">
            <i class="fa fa-search"></i>
        </div>
        <div class="index-title-text-content">
            <h2 class="index-main-title">实体识别</h2>
            <p class="index-subtitle">命名实体识别功能</p>
        </div>
    </div>

    <!-- 面包屑 -->
    <ol class="index-breadcrumb-modern">
        <li><a href="/"><i class="fa fa-home"></i> 首页</a></li>
        <li class="index-breadcrumb-divider">/</li>
        <li class="active">实体识别</li>
    </ol>

    <!-- 输入区域 -->
    <div class="card index-input-card-modern">
        <div class="index-card-header-modern index-header-primary">
            <div class="index-header-icon">
                <i class="fa fa-edit"></i>
            </div>
            <span class="index-header-title">输入文本</span>
        </div>
        <div class="index-card-body-modern">
            <form action="/ER-post" method="post">
                <div class="index-form-group">
                    {% csrf_token %}
                    <textarea
                            name="user_text"
                            class="index-textarea-modern form-control"
                            placeholder="请输入您需要识别的文本内容..."                            style="min-height:140px; resize:vertical;"
                    ></textarea>
                </div>
                <div class="index-button-container-modern">
                    <button type="submit" class="index-btn-submit-modern btn">
                        <i class="fa fa-paper-plane"></i> 提交
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 结果展示区域 -->
    <div class="index-results-group-modern">
        <!-- 识别结果 -->
        <div class="card index-result-card-modern">
            <div class="index-card-header-modern index-header-success">
                <div class="index-header-content">
                    <div class="index-header-icon-small">
                        <i class="fa fa-tags"></i>
                    </div>
                    <span class="index-header-title">识别结果</span>
                </div>
            </div>
            <div class="index-card-body-result-modern">
                {% autoescape off %}
                <div class="index-result-box-modern index-entity-box-modern">
                    {{ rlt }}
                </div>
                {% endautoescape %}
            </div>
        </div>

        <!-- 分词结果 -->
        <div class="card index-result-card-modern">
            <div class="index-card-header-modern index-header-info">
                <div class="index-header-content">
                    <div class="index-header-icon-small">
                        <i class="fa fa-cut"></i>
                    </div>
                    <span class="index-header-title">分词结果</span>
                </div>
            </div>
            <div class="index-card-body-result-modern">
                {% autoescape off %}
                <div class="index-result-box-modern index-word-box-modern">
                    {{ seg_word }}
                </div>
                {% endautoescape %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
