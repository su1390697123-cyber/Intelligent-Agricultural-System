{% extends "base.html" %} {% block mainbody %}
<script src="/static/js/echarts.js"></script>
{#    <script type="text/javascript" src="http://echarts.baidu.com/gallery/vendors/echarts/echarts-all-3.js"></script>#}
{#    <script src="/static/js/echarts.all.js"></script>#}
<div class="qa-page-container">
    <!-- 页面标题 -->
    <div class="qa-title-section">
        <div class="qa-icon-box-modern">
            <i class="icon_chat_alt"></i>
        </div>
        <div class="qa-title-text-content">
            <h2 class="qa-main-title">农知问答</h2>
            <p class="qa-subtitle">智能农业知识问答系统</p>
        </div>
    </div>

    <!-- 面包屑导航 -->
    <ol class="qa-breadcrumb-modern">
        <li><a href="/"><i class="fa fa-home"></i> 首页</a></li>
        <li class="qa-breadcrumb-divider">/</li>
        <li class="active"><i class="icon_chat_alt"></i> 农知问答</li>
    </ol>

    <div class="qa-content-wrapper">
        <!-- 问题输入区域 -->
        <div class="qa-input-card-modern">
            <div class="qa-card-header-modern">
                <div class="qa-header-icon">
                    <i class="fa fa-commenting"></i>
                </div>
                <span class="qa-header-title">输入问题</span>
            </div>
            <div class="qa-card-body-modern">
                <form class="qa-form-inline" method="get">
                    <div class="qa-input-wrapper">
                        <input
                                type="text"
                                name="question"
                                id="question"
                                class="qa-form-control-modern"
                                placeholder="请输入您的问题，例如：崇明县适合种什么植物？"
                        >
                    </div>
                    <button type="submit" class="qa-btn-submit-modern">
                        <i class="fa fa-paper-plane"></i>
                        <span>提交</span>
                    </button>
                </form>

                <!-- 热门搜索 -->
                <div class="qa-hot-search-modern">
                    <div class="qa-hot-search-title">
                        <div class="qa-fire-icon">
                            <i class="fa fa-fire"></i>
                        </div>
                        <span>热门搜索：</span>
                    </div>
                    <div class="qa-hot-tags-modern">
                        <span class="qa-hot-tag-modern" onclick="document.getElementById('question').value='崇明县适合种什么植物？'">
                            崇明县适合种什么植物？
                        </span>
                        <span class="qa-hot-tag-modern" onclick="document.getElementById('question').value='胡萝卜汁含有哪些营养成分？'">
                            胡萝卜汁含有哪些营养成分？
                        </span>
                        <span class="qa-hot-tag-modern" onclick="document.getElementById('question').value='中国的首都的气候类型是什么？'">
                            中国的首都的气候类型是什么？
                        </span>
                        <span class="qa-hot-tag-modern" onclick="document.getElementById('question').value='大豆的植物学分类'">
                            大豆的植物学分类
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果展示区域 -->
        {% if ctx %}
        <!-- 无答案提示 -->
        <div class="qa-result-card-modern">
            <div class="qa-result-body-modern">
                <div class="qa-no-result-box">
                    <div class="qa-no-result-icon">
                        <i class="fa fa-question-circle"></i>
                    </div>
                    <h2 class="qa-no-result-text">暂未找到答案</h2>
                </div>
            </div>
        </div>
        {% endif %}

        {% if ret %}
        <div class="qa-results-grid">
            <!-- 答案列表 -->
            <div class="qa-answer-panel-modern">
                <div class="qa-result-card-modern">
                    <div class="qa-card-header-modern qa-header-success">
                        <div class="qa-header-icon">
                            <i class="fa fa-check-circle"></i>
                        </div>
                        <span class="qa-header-title">答案</span>
                    </div>
                    <div class="qa-result-body-modern">
                        <div class="qa-table-wrapper-modern">
                            <table class="qa-table-modern" data-paging="true" data-sorting="true" data-paging-size="10"></table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 图谱展示 -->
            <div class="qa-graph-panel-modern">
                <div class="qa-result-card-modern">
                    <div class="qa-card-header-modern qa-header-graph">
                        <div class="qa-header-icon">
                            <i class="fa fa-sitemap"></i>
                        </div>
                        <span class="qa-header-title">图谱演示</span>
                    </div>
                    <div class="qa-result-body-modern">
                        <div class="qa-graph-wrapper-modern">
                            <div id="graph" class="qa-graph-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</div>
<script src="/static/js/jquery-1.8.3.min.js"></script>

{% if ret %}
<script type="text/javascript">
    var ret_dict = {{ret|safe}} ;
    //将所有的答案列在tableData中
    tableData = [];
    for(var i = 0 ;i< ret_dict['answer'].length;i++){
        answer = {};
        answer['answer'] = ret_dict['answer'][i];
        tableData.push(answer)
    }

    jQuery(function () {
        $('.qa-table-modern').footable({
            "columns":[{"name":"answer",title:"答案"}],
            "rows": tableData
        });

    });

    // echarts 数据
    var data = [];
    var links = [];

    //构造数据
    var id = 0
    for (var i = 0 ;i<ret_dict['list'].length;i++){
        node1 = {};
        node1['name'] = ret_dict['list'][i]['entity1'];
        node1['draggable'] = true;

        if(ret_dict['list'][i]['entity1_type'] === '地点'){
            node1['category'] = 0;
        }
        else if(ret_dict['list'][i]['entity1_type'] === '气候'){
            node1['category'] = 1;
        }
        else if(ret_dict['list'][i]['entity1_type'] === '植物科'){
            node1['category'] = 2;
        }
        else if(ret_dict['list'][i]['entity1_type'] === '植物'){
            node1['category'] = 3;
        }
        else if(ret_dict['list'][i]['entity1_type'] === '主语'){
            node1['category'] = 1
        }
        else if(ret_dict['list'][i]['entity1_type'] === '元素'){
            node1['category']  = 2
        }
        else if(ret_dict['list'][i]['entity1_type'] === '类型'){
            node1['category'] = 1
        }

        nodeId = id.toString();

        var flag = 1;
        for(var j  =0 ;j<data.length ; j++){
            if(data[j]['name'] === node1['name']){
                flag = 0 ;
                nodeId = data[j]['id'] ;
                break ;
            }
        }

        node1['id'] = nodeId;
        if(flag === 1){
            id++ ;
            data.push(node1)
        }


        node2={};
        node2['name'] = ret_dict['list'][i]['entity2'];
        node2['draggable'] = true
        if(ret_dict['list'][i]['entity2_type'] === '地点'){
            node2['category'] = 0
        }
        else if(ret_dict['list'][i]['entity2_type'] === '气候'){
            node2['category'] = 1
        }
        else if(ret_dict['list'][i]['entity2_type'] === '植物科'){
            node2['category'] = 2
        }
        else if(ret_dict['list'][i]['entity2_type'] === '植物'){
            node2['category'] = 3
        }
        else if(ret_dict['list'][i]['entity2_type'] === '主语'){
            node2['category'] = 1
        }
        else if(ret_dict['list'][i]['entity2_type'] === '元素'){
            node2['category']  = 2
        }
        else if(ret_dict['list'][i]['entity2_type'] === '类型'){
            node2['category'] = 1
        }
        nodeId = id.toString();

        var flag  =1;
        for(var j=0;j<data.length;j++){
            if(data[j]['name'] === node2['name']){
                flag = 0;
                nodeId = data[j]['id'] ;
                break ;
            }
        }

        node2['id'] = nodeId;
        if(flag === 1){
            id++ ;
            data.push(node2) ;
        }

        //  relation
        relation = {};
        relation['source'] = node1['id'];
        relation['target'] = node2['id'];
        relation['category'] = 0;

        var flag = 1;
        for(var j = 0 ;j<links.length ;j++){
            if(links[j]['source'] === relation['source'] && links[j]['target'] === relation['target']){
                flag = 0 ;
                break ;
            }
        }
        if(flag === 1){
            relation['value'] = ret_dict['list'][i]['rel'] ;
            relation['symbolSize'] = 10 ;
            links.push(relation)  ;
        }

    }

    // 基于准备好的dom，初始化echarts实例
    var myChart = echarts.init(document.getElementById('graph'));

    option = {
	    title: {
	        text: ''
	    },
	    tooltip: {},
	    animationDurationUpdate: 1500,
	    animationEasingUpdate: 'quinticInOut',
	    label: {
	        normal: {
	            show: true,
	            textStyle: {
	                fontSize: 12
	            },
	        }
	    },
	    legend: {
	        x: "center",
	        show: false
	    },
	    series: [

	        {
	            type: 'graph',
	            layout: 'force',
	            symbolSize: 45,
	            focusNodeAdjacency: true,
	            roam: true,
	            edgeSymbol: ['none', 'arrow'],
	            categories: [{
	                name: '地点',
	                itemStyle: {
	                    normal: {
	                        color: "#97980e",
	                    }
	                }
	            }, {
	                name: '气候',
	                itemStyle: {
	                    normal: {
	                        color: "#4592FF",
	                    }
	                }
	            }, {
	                name: '植物科',
	                itemStyle: {
	                    normal: {
	                        color: "#C71585",
	                    }
	                }
	            }, {
	                name: '答案',
	                itemStyle: {
	                    normal: {
	                        color: "#73C453",
	                    }
	                }
	            }],
	            label: {
	                normal: {
	                    show: true,
	                    textStyle: {
	                        fontSize: 12,
	                    },
	                }
	            },
	            force: {
	                repulsion: 1000
	            },
	            edgeSymbolSize: [4, 50],
	            edgeLabel: {
	                normal: {
	                    show: true,
	                    textStyle: {
	                        fontSize: 10
	                    },
	                    formatter: "{c}"
	                }
	            },
	            data: data,
	            links: links,
	            lineStyle: {
	                normal: {
	                    opacity: 0.9,
	                    width: 1.3,
	                    curveness: 0,
	                    color:"#262626",
	                }
	            }
	        }
	    ]
	};
	// 使用刚指定的配置项和数据显示图表。
	myChart.setOption(option);
</script>
{% endif %}

{% endblock %}
